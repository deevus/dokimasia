name: Vouch PR gate

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out base repository
        uses: actions/checkout@v4

      - name: Check PR author vouch status
        uses: mitchellh/vouch/action/check-pr@v1
        with:
          pr-number: ${{ github.event.pull_request.number }}
          auto-close: true
          require-vouch: true
          template-file: .github/vouch-pr-close.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
